name: Deploy Node App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout latest code
      - name: Checkout Code
        uses: actions/checkout@v4.11.0   # Node 24 compatible

      # 2️⃣ Copy project files to server
      - name: Copy Files to Server
        uses: appleboy/scp-action@v0.1.9
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "."
          target: "/home/testuser/nodeapp"

      # 3️⃣ Restart Node.js app via SSH
      - name: Restart Node App
        uses: appleboy/ssh-action@v1.0.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/testuser/nodeapp
            npm install
            pm2 delete node-test || true
            pm2 start server.js --name node-test
            pm2 save